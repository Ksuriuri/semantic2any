seed: 1234

paths:
  indextts_root: /mnt/data_sdd/hhy/index-tts
  model_dir: /mnt/data_sdd/hhy/index-tts/checkpoints/IndexTTS-2-vLLM
  semantic_codec_ckpt: ""
  campplus_ckpt: campplus/campplus_cn_common.bin
  w2v_bert_dir: w2v-bert-2.0
  w2v_stat: wav2vec2bert_stats.pt

vocoder:
  model_id: nvidia/bigvgan_v2_44khz_128band_512x
  cache_dir: /mnt/data_sdd/hhy/noiz-tts/vae-eval/.hf_cache
  local_files_only: true

data:
  train_jsonl: /mnt/data_3t_1/datasets/preprocess/s2mel-train-data/splits/seed1234_valid1000/train.jsonl
  valid_jsonl: /mnt/data_3t_1/datasets/preprocess/s2mel-train-data/splits/seed1234_valid1000/valid.jsonl
  train_speechdata_dir: ""
  valid_speechdata_dir: ""
  speechdata_cache_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/.cache/speechdata
  max_audio_seconds: 30.0
  pair_same_speaker: false
  random_split_audio: true
  min_prompt_seconds: 3.0
  max_prompt_seconds: null
  min_target_seconds: 3.0
  min_generated_frames: 8
  semantic_fps: 50.0
  sample_rate_16k: 16000
  sample_rate_mel: 44100
  num_workers: 8
  prefetch_factor: 2
  decode_audio_in_worker: true
  skip_audio_errors: true
  feature_batch_size: 16
  async_feature_extraction: true
  preload_features: false
  preload_batch_size: 16

preprocess_params:
  sr: 44100
  spect_params:
    n_fft: 2048
    win_length: 2048
    hop_length: 512
    n_mels: 128
    fmin: 0
    fmax: "None"

s2mel:
  dit_type: DiT
  reg_loss_type: l2
  use_gpt_latent: false
  inference_steps: 25
  inference_cfg_rate: 0.7
  length_ratio: 1.72265625
  style_encoder:
    dim: 192
  length_regulator:
    channels: 512
    is_discrete: false
    in_channels: 1024
    content_codebook_size: 8192
    sampling_ratios: [1, 1, 1, 1]
    n_codebooks: 1
    quantizer_dropout: 0.0
    f0_condition: false
    n_f0_bins: 512
  DiT:
    hidden_dim: 512
    num_heads: 8
    depth: 13
    class_dropout_prob: 0.1
    block_size: 8192
    in_channels: 128
    style_condition: true
    final_layer_type: wavenet
    content_dim: 512
    content_codebook_size: 1024
    content_type: continuous
    is_causal: false
    long_skip_connection: true
    zero_prompt_speech_token: false
    time_as_token: false
    style_as_token: false
    uvit_skip_connection: true
  wavenet:
    hidden_dim: 512
    num_layers: 8
    kernel_size: 5
    dilation_rate: 1
    p_dropout: 0.2
    style_condition: true

train:
  output_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/exp/s2mel_dit_train_data_random_split_bigvgan_v2_44khz_128band_512x
  # Match the ZipFormer baseline's global batch: 8 × 4 accumulation × 4 GPUs = 128.
  batch_size: 8
  epochs: 10
  max_steps: 0
  grad_accumulation: 4
  learning_rate: 1.0e-4
  min_learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  lr_scheduler: cosine
  grad_clip: 1.0
  mixed_precision: fp16
  log_interval: 20
  valid_interval: 1000
  save_interval: 1000
  archive_save_interval: 10000
  keep_last: 3
  resume_from: ""
  no_wandb: false
  wandb_entity: haoyuanhuang22-jcxy
  wandb_project: semantic2mel
  wandb_run_name: s2mel-dit-train-data-random-split-bigvgan-v2-44khz-128band-512x
