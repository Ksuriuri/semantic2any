  epochs: 350
  max_steps: 0
  grad_accumulation: 1
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip: 1.0
  mixed_precision: fp16
  log_interval: 20
  valid_interval: 1000
  save_interval: 250
  keep_last: 5
  resume_from: ""
  no_wandb: false
  wandb_entity: haoyuanhuang22-jcxy
  wandb_project: semantic2mel
  wandb_run_name: s2mel-vctk-train-minus-test-10pct-bigvgan-v2-44khz-128band-512x-e350-bs32-4gpu-l2
