  reg_loss_type: l2
  use_gpt_latent: false
  inference_steps: 25
  inference_cfg_rate: 0.7
  length_ratio: 1.72265625
  style_encoder:
    dim: 192
  length_regulator:
    channels: 512
    is_discrete: false
    in_channels: 1024
    content_codebook_size: 8192
    sampling_ratios: [1, 1, 1, 1]
    n_codebooks: 1
    quantizer_dropout: 0.0
    f0_condition: false
    n_f0_bins: 512
  DiT:
    in_channels: 128
    content_dim: 512
    zero_prompt_speech_token: false
  ZipFormer:
    hidden_dim: 512
    feedforward_dim: 1536
    num_heads: 4
    downsampling_factor: [1, 2, 4, 2, 1]
    num_layers: [2, 2, 4, 4, 4]
    cnn_module_kernel: [31, 15, 7, 15, 31]
    query_head_dim: 32
    value_head_dim: 12
    pos_head_dim: 4
    pos_dim: 48
    time_embed_dim: 192
    style_condition: true
    class_dropout_prob: 0.1
    condition_dropout_prob: 0.1
    use_conv: true

train:
  output_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/exp/vctk_train_minus_test_10pct_bigvgan_v2_44khz_128band_512x_e350_bs32_4gpu_l2/checkpoints
