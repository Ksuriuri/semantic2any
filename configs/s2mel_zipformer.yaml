seed: 1234

paths:
  model_dir: checkpoints/feature-extractors
  semantic_codec_ckpt: ""
  campplus_ckpt: campplus/campplus_cn_common.bin
  w2v_bert_dir: w2v-bert-2.0
  w2v_stat: wav2vec2bert_stats.pt

vocoder:
  model_id: nvidia/bigvgan_v2_44khz_128band_512x
  cache_dir: checkpoints/huggingface
  local_files_only: true

semantic_codec:
  # Switch to "sac" for 12.5 Hz, 1280-dim SAC raw semantic embeddings.
  type: maskgct
  source_model: Soul-AILab/SAC-16k-62_5Hz
  tokenizer_model: zai-org/glm-4-voice-tokenizer
  revision: a5f2404e63c84e92f5238908e1706316324ebafa
  tokenizer_path: ""
  cache_dir: ""
  local_files_only: false
  max_chunk_seconds: 30.0
  chunk_batch_size: 16

data:
  train_jsonl: ""
  valid_jsonl: ""
  train_speechdata_dir: ""
  valid_speechdata_dir: ""
  speechdata_cache_dir: .cache/speechdata
  max_audio_seconds: 60.0
  pair_same_speaker: true
  random_split_audio: false
  max_pair_seconds: 80.0
  min_pair_prompt_seconds: 3.0
  min_prompt_seconds: 1.0
  max_prompt_seconds: 20.0
  min_target_seconds: null
  max_target_seconds: 60.0
  min_generated_frames: 8
  # w2v-bert 2.0 features / MaskGCT semantic codec run at 50 Hz (IndexTTS2 uses code_lens * 1.72 -> mel frames).
  semantic_fps: 50.0
  sample_rate_16k: 16000
  sample_rate_mel: 44100
  num_workers: 8
  prefetch_factor: 2
  decode_audio_in_worker: false
  skip_audio_errors: false
  feature_batch_size: 16
  async_feature_extraction: true

preprocess_params:
  sr: 44100
  spect_params:
    n_fft: 2048
    win_length: 2048
    hop_length: 512
    n_mels: 128
    fmin: 0
    fmax: "None"

s2mel:
  dit_type: ZipFormer
  reg_loss_type: l1
  use_gpt_latent: false
  inference_steps: 25
  inference_cfg_rate: 0.7
  length_ratio: 1.72
  style_encoder:
    dim: 192
  length_regulator:
    channels: 512
    is_discrete: false
    in_channels: 1024
    content_codebook_size: 8192
    sampling_ratios: [1, 1, 1, 1]
    n_codebooks: 1
    quantizer_dropout: 0.0
    f0_condition: false
    n_f0_bins: 512
  DiT:
    in_channels: 128
    content_dim: 512
    zero_prompt_speech_token: false
  ZipFormer:
    hidden_dim: 512
    feedforward_dim: 4096
    num_heads: 4
    downsampling_factor: [1, 2, 4, 2, 1]
    num_layers: [3, 3, 6, 6, 6]
    cnn_module_kernel: [31, 15, 7, 15, 31]
    query_head_dim: 32
    value_head_dim: 12
    pos_head_dim: 4
    pos_dim: 48
    time_embed_dim: 192
    style_condition: false
    class_dropout_prob: 0.1
    condition_dropout_prob: 0.1
    use_conv: true

train:
  output_dir: exp/s2mel_zipformer
  batch_size: 4
  epochs: 10
  max_steps: 0
  grad_accumulation: 1
  learning_rate: 1.0e-4
  min_learning_rate: 1.0e-5
  lr_scheduler: cosine
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip: 1.0
  mixed_precision: fp16
  log_interval: 20
  valid_interval: 500
  save_interval: 10000
  archive_save_interval: 0
  keep_last: 5
  resume_from: ""
  no_wandb: false
  wandb_entity: haoyuanhuang22-jcxy
  wandb_project: semantic2mel
  wandb_run_name: s2mel_zipformer-vctk-8gpu
