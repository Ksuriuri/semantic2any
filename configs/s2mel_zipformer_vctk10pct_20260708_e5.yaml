seed: 1234

paths:
  model_dir: checkpoints/feature-extractors
  semantic_codec_ckpt: ""
  campplus_ckpt: campplus/campplus_cn_common.bin
  w2v_bert_dir: w2v-bert-2.0
  w2v_stat: wav2vec2bert_stats.pt

data:
  train_jsonl: ""
  valid_jsonl: ""
  train_speechdata_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/datasets/vctk_10pct_speaker_stratified/metadata/vctk_train_minus_test_10pct.jsonl
  valid_speechdata_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/datasets/vctk_10pct_speaker_stratified/metadata/vctk_test_10pct.jsonl
  speechdata_cache_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/.cache/speechdata
  max_audio_seconds: 30.0
  pair_same_speaker: true
  max_pair_seconds: 30.0
  min_pair_prompt_seconds: 3.0
  min_prompt_seconds: 1.0
  max_prompt_seconds: 5.0
  min_generated_frames: 8
  semantic_fps: 50.0
  sample_rate_16k: 16000
  sample_rate_mel: 22050
  num_workers: 0
  prefetch_factor: 2

preprocess_params:
  sr: 22050
  spect_params:
    n_fft: 1024
    win_length: 1024
    hop_length: 256
    n_mels: 80
    fmin: 0
    fmax: "None"

s2mel:
  dit_type: ZipFormer
  reg_loss_type: l1
  use_gpt_latent: false
  inference_steps: 25
  inference_cfg_rate: 0.7
  length_ratio: 1.72
  style_encoder:
    dim: 192
  length_regulator:
    channels: 512
    is_discrete: false
    in_channels: 1024
    content_codebook_size: 8192
    sampling_ratios: [1, 1, 1, 1]
    n_codebooks: 1
    quantizer_dropout: 0.0
    f0_condition: false
    n_f0_bins: 512
  DiT:
    in_channels: 80
    content_dim: 512
    zero_prompt_speech_token: false
  ZipFormer:
    hidden_dim: 512
    feedforward_dim: 1536
    num_heads: 4
    downsampling_factor: [1, 2, 4, 2, 1]
    num_layers: [2, 2, 4, 4, 4]
    cnn_module_kernel: [31, 15, 7, 15, 31]
    query_head_dim: 32
    value_head_dim: 12
    pos_head_dim: 4
    pos_dim: 48
    time_embed_dim: 192
    style_condition: true
    class_dropout_prob: 0.1
    condition_dropout_prob: 0.1
    use_conv: true

train:
  output_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/exp/vctk_10pct_speaker_stratified_20260708_e5/checkpoints
  batch_size: 32
  epochs: 5
  max_steps: 0
  grad_accumulation: 1
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip: 1.0
  mixed_precision: fp16
  log_interval: 20
  valid_interval: 500
  save_interval: 2500
  keep_last: 5
  resume_from: ""
  no_wandb: false
  wandb_entity: haoyuanhuang22-jcxy
  wandb_project: semantic2mel
  wandb_run_name: s2mel_zipformer-vctk-20260708-e5
