seed: 1234

paths:
  model_dir: checkpoints/feature-extractors
  semantic_codec_ckpt: ""
  campplus_ckpt: campplus/campplus_cn_common.bin
  w2v_bert_dir: w2v-bert-2.0
  w2v_stat: wav2vec2bert_stats.pt

vocoder:
  model_id: nvidia/bigvgan_v2_44khz_128band_512x
  cache_dir: checkpoints/huggingface
  local_files_only: true

data:
  # Run scripts/split_s2mel_validation.py after all MaskGCT shards finish.
  train_jsonl: /mnt/data_3t_1/datasets/preprocess/s2mel-train-data-filtered/maskgct-codes/splits/seed1234_valid1000/train.jsonl
  valid_jsonl: /mnt/data_3t_1/datasets/preprocess/s2mel-train-data-filtered/maskgct-codes/splits/seed1234_valid1000/valid.jsonl
  train_speechdata_dir: ""
  valid_speechdata_dir: ""
  speechdata_cache_dir: .cache/speechdata
  # This must match semantic_max_audio_seconds in the generated code manifests.
  max_audio_seconds: 60.0
  pair_same_speaker: true
  random_split_audio: false
  min_prompt_seconds: 3.0
  max_prompt_seconds: 20.0
  min_pair_prompt_seconds: 3.0
  min_target_seconds: 3.0
  max_target_seconds: 60.0
  max_pair_seconds: 80.0
  min_generated_frames: 8
  semantic_fps: 50.0
  sample_rate_16k: 16000
  sample_rate_mel: 44100
  num_workers: 8
  prefetch_factor: 2
  decode_audio_in_worker: true
  skip_audio_errors: true
  feature_batch_size: 16
  async_feature_extraction: true
  preload_features: false
  preload_batch_size: 16
  # Prompt-mel only: with this probability, band-limit prompt audio to a
  # randomly chosen rate below (16 kHz / 22.05 kHz simulation). Semantic codes
  # stay on the original prompt; validation disables this augmentation.
  prompt_bandwidth_aug_prob: 0.3
  prompt_bandwidth_aug_rates: [16000, 22050]

preprocess_params:
  sr: 44100
  spect_params:
    n_fft: 2048
    win_length: 2048
    hop_length: 512
    n_mels: 128
    fmin: 0
    fmax: "None"

s2mel:
  dit_type: ZipFormer
  reg_loss_type: l2
  use_gpt_latent: false
  inference_steps: 25
  inference_cfg_rate: 0.7
  length_ratio: 1.72265625
  style_encoder:
    dim: 192
  length_regulator:
    channels: 512
    is_discrete: false
    in_channels: 1024
    content_codebook_size: 8192
    sampling_ratios: [1, 1, 1, 1]
    n_codebooks: 1
    quantizer_dropout: 0.0
    f0_condition: false
    n_f0_bins: 512
  DiT:
    in_channels: 128
    content_dim: 512
    zero_prompt_speech_token: false
  ZipFormer:
    hidden_dim: 512
    feedforward_dim: 4096
    num_heads: 4
    downsampling_factor: [1, 2, 4, 2, 1]
    num_layers: [3, 3, 6, 6, 6]
    cnn_module_kernel: [31, 15, 7, 15, 31]
    query_head_dim: 32
    value_head_dim: 12
    pos_head_dim: 4
    pos_dim: 48
    time_embed_dim: 192
    style_condition: false
    class_dropout_prob: 0.1
    condition_dropout_prob: 0.1
    use_conv: true

train:
  output_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/exp/s2mel_train_data_filtered_speaker_pair_bigvgan_v2_44khz_128band_512x
  batch_size: 32
  epochs: 10
  max_steps: 0
  grad_accumulation: 1
  learning_rate: 1.0e-4
  min_learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  lr_scheduler: cosine
  grad_clip: 1.0
  mixed_precision: fp16
  log_interval: 20
  valid_interval: 1000
  save_interval: 1000
  archive_save_interval: 10000
  keep_last: 3
  resume_from: ""
  no_wandb: false
  wandb_entity: haoyuanhuang22-jcxy
  wandb_project: semantic2mel
  wandb_run_name: s2mel-train-data-filtered-speaker-pair-bigvgan-v2-44khz-128band-512x
