seed: 1234

paths:
  indextts_root: /mnt/data_sdd/hhy/index-tts
  model_dir: /mnt/data_sdd/hhy/index-tts/checkpoints/IndexTTS-2-vLLM
  semantic_codec_ckpt: ""
  campplus_ckpt: campplus/campplus_cn_common.bin
  w2v_bert_dir: w2v-bert-2.0
  w2v_stat: wav2vec2bert_stats.pt

semantic_codec:
  type: sac
  source_model: Soul-AILab/SAC-16k-62_5Hz
  tokenizer_model: zai-org/glm-4-voice-tokenizer
  revision: a5f2404e63c84e92f5238908e1706316324ebafa
  tokenizer_path: ""
  cache_dir: /home/tanhe/.cache/huggingface/hub
  local_files_only: true
  max_chunk_seconds: 30.0
  # Keep the frozen WhisperVQ peak low while the trainable model holds a
  # local batch of eight long 44.1 kHz examples.
  chunk_batch_size: 2

vocoder:
  model_id: nvidia/bigvgan_v2_44khz_128band_512x
  cache_dir: /mnt/data_sdd/hhy/noiz-tts/vae-eval/.hf_cache
  local_files_only: true

data:
  train_jsonl: /mnt/data_3t_1/datasets/preprocess/s2mel-train-data/splits/seed1234_valid1000/train.jsonl
  valid_jsonl: /mnt/data_3t_1/datasets/preprocess/s2mel-train-data/splits/seed1234_valid1000/valid.jsonl
  train_speechdata_dir: ""
  valid_speechdata_dir: ""
  speechdata_cache_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/.cache/speechdata
  # Match IndexTTS2's 16384-frame s2mel budget:
  # 16384 * 512 / 44100 == 16384 * 256 / 22050 ~= 190.22 seconds.
  # This is the combined prompt + target duration, not target-only duration.
  max_audio_seconds: 190.22
  max_pair_seconds: 190.22
  pair_same_speaker: false
  random_split_audio: true
  min_prompt_seconds: 3.0
  max_prompt_seconds: 15.0
  min_target_seconds: 3.0
  min_generated_frames: 8
  semantic_fps: 12.5
  sample_rate_16k: 16000
  sample_rate_mel: 44100
  num_workers: 8
  prefetch_factor: 2
  pin_memory: false
  decode_audio_in_worker: true
  skip_audio_errors: true
  feature_batch_size: 4
  # Overlap frozen SAC extraction with model training.
  async_feature_extraction: true
  preload_features: false
  preload_batch_size: 16

preprocess_params:
  sr: 44100
  spect_params:
    n_fft: 2048
    win_length: 2048
    hop_length: 512
    n_mels: 128
    fmin: 0
    fmax: null

s2mel:
  dit_type: ZipFormer
  reg_loss_type: l2
  use_gpt_latent: false
  inference_steps: 25
  inference_cfg_rate: 0.7
  length_ratio: 6.890625
  style_encoder:
    dim: 192
  length_regulator:
    channels: 512
    is_discrete: false
    in_channels: 1280
    content_codebook_size: 8192
    sampling_ratios: [1, 1, 1, 1]
    n_codebooks: 1
    quantizer_dropout: 0.0
    f0_condition: false
    n_f0_bins: 512
  DiT:
    in_channels: 128
    content_dim: 512
    zero_prompt_speech_token: false
    style_condition: false
  ZipFormer:
    hidden_dim: 512
    feedforward_dim: 4096
    num_heads: 4
    downsampling_factor: [1, 2, 4, 2, 1]
    num_layers: [2, 2, 4, 4, 4]
    cnn_module_kernel: [31, 15, 7, 15, 31]
    query_head_dim: 32
    value_head_dim: 12
    pos_head_dim: 4
    pos_dim: 48
    time_embed_dim: 192
    style_condition: false
    class_dropout_prob: 0.1
    condition_dropout_prob: 0.1
    use_conv: true

train:
  output_dir: /mnt/data_sdd/hhy/noiz-tts/semantic2any/exp/exp06_44k_nostyle_zipformer_sac_local8x4090
  # Original effective batch: 16 GPUs * 32 = 512.
  # Local effective batch: 8 GPUs * 16 * 4 accumulation = 512.
  batch_size: 16
  epochs: 60
  max_steps: 0
  grad_accumulation: 4
  learning_rate: 1.0e-4
  min_learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  lr_scheduler: cosine
  grad_clip: 1.0
  mixed_precision: fp16
  log_interval: 20
  valid_interval: 1000
  save_interval: 1000
  archive_save_interval: 10000
  keep_last: 3
  resume_from: ""
  find_unused_parameters: true
  no_wandb: false
  wandb_entity: haoyuanhuang22-jcxy
  wandb_project: semantic2mel
  wandb_run_name: exp06_44k_nostyle_zipformer_sac_local8x4090
